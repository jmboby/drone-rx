  <circle cx="18" cy="16" r="2" fill="#06b6d4"/>
  <circle cx="46" cy="16" r="2" fill="#06b6d4"/>
  <circle cx="18" cy="48" r="2" fill="#06b6d4"/>
  <circle cx="46" cy="48" r="2" fill="#06b6d4"/>
</svg>
