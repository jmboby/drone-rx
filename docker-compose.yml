services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: dronerx
      POSTGRES_USER: dronerx
      POSTGRES_PASSWORD: dronerx
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dronerx"]
      interval: 2s
      timeout: 5s
      retries: 10

  nats:
    image: nats:2-alpine
    ports:
      - "4222:4222"

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      DATABASE_URL: "postgres://dronerx:dronerx@postgres:5432/dronerx?sslmode=disable"
      NATS_URL: "nats://nats:4222"
      TICKER_INTERVAL: "10"
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:3000"
    environment:
      PORT: "3000"
      ORIGIN: "http://localhost:3000"
      API_URL: "http://api:8080"
    depends_on:
      - api

volumes:
  pgdata:
