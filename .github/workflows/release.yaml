name: Replicated Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_call:
    inputs:
      version:
        type: string
        required: true

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io/jmboby
  API_IMAGE: ghcr.io/jmboby/dronerx-api
  FRONTEND_IMAGE: ghcr.io/jmboby/dronerx-frontend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: meta
        run: |
          RAW="${{ inputs.version || github.ref_name }}"
          VERSION="${RAW#v}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Version: ${VERSION}"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        run: |
          docker build --platform linux/amd64 \
            -f Dockerfile.api \
            -t ${{ env.API_IMAGE }}:${{ steps.meta.outputs.version }} \
            -t ${{ env.API_IMAGE }}:latest .
          docker push ${{ env.API_IMAGE }}:${{ steps.meta.outputs.version }}
          docker push ${{ env.API_IMAGE }}:latest

      - name: Build and push Frontend image
        run: |
          docker build --platform linux/amd64 \
            -f Dockerfile.frontend \
            -t ${{ env.FRONTEND_IMAGE }}:${{ steps.meta.outputs.version }} \
            -t ${{ env.FRONTEND_IMAGE }}:latest .
          docker push ${{ env.FRONTEND_IMAGE }}:${{ steps.meta.outputs.version }}
          docker push ${{ env.FRONTEND_IMAGE }}:latest

  create-release:
    runs-on: ubuntu-latest
    needs: build-and-push
    outputs:
      release-sequence: ${{ steps.release.outputs.sequence }}
      channel: ${{ steps.release.outputs.channel }}
      channel-id: ${{ steps.release.outputs.channel-id }}
    env:
      REPLICATED_APP: ${{ secrets.REPLICATED_APP }}
      REPLICATED_API_TOKEN: ${{ secrets.REPLICATED_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Replicated CLI
        run: |
          curl -s https://api.github.com/repos/replicatedhq/replicated/releases/latest \
            | grep "browser_download_url.*linux_amd64.tar.gz" \
            | cut -d '"' -f 4 \
            | xargs curl -sL | tar xz -C /usr/local/bin replicated

      - name: Add Helm repos
        run: |
          helm repo add cnpg https://cloudnative-pg.github.io/charts
          helm repo add nats https://nats-io.github.io/k8s/helm/charts
          helm repo update

      - name: Set image tags and chart version
        run: |
          VERSION="${{ needs.build-and-push.outputs.version }}"
          sed -i "s|tag: \"[^\"]*\" # x-release-please-version|tag: \"${VERSION}\" # x-release-please-version|g" chart/values.yaml
          sed -i "s|^version:.*|version: ${VERSION}|" chart/Chart.yaml
          sed -i "s|^appVersion:.*|appVersion: \"${VERSION}\"|" chart/Chart.yaml
          sed -i "s/\$VERSION/${VERSION}/g" replicated/dronerx-chart.yaml
          echo "Chart values:"
          grep 'tag:' chart/values.yaml
          grep 'version:' chart/Chart.yaml

      - name: Create Replicated Release on temp channel
        id: release
        run: |
          CHANNEL="release-${GITHUB_RUN_ID}"
          OUTPUT=$(replicated release create \
            --version ${{ needs.build-and-push.outputs.version }} \
            --promote "${CHANNEL}" \
            --ensure-channel 2>&1)
          echo "${OUTPUT}"
          SEQUENCE=$(echo "${OUTPUT}" | grep -oE 'SEQUENCE:\s+[0-9]+' | grep -oE '[0-9]+')
          CHANNEL_ID=$(echo "${OUTPUT}" | grep -oE 'Channel [a-zA-Z0-9]+' | head -1 | awk '{print $2}')
          echo "sequence=${SEQUENCE}" >> $GITHUB_OUTPUT
          echo "channel=${CHANNEL}" >> $GITHUB_OUTPUT
          echo "channel-id=${CHANNEL_ID}" >> $GITHUB_OUTPUT

  test-on-cmx:
    runs-on: ubuntu-latest
    needs: [build-and-push, create-release]
    env:
      REPLICATED_APP: ${{ secrets.REPLICATED_APP }}
      REPLICATED_API_TOKEN: ${{ secrets.REPLICATED_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Replicated CLI
        run: |
          curl -s https://api.github.com/repos/replicatedhq/replicated/releases/latest \
            | grep "browser_download_url.*linux_amd64.tar.gz" \
            | cut -d '"' -f 4 \
            | xargs curl -sL | tar xz -C /usr/local/bin replicated

      - name: Create test customer
        id: customer
        run: |
          OUTPUT=$(replicated customer create \
            --name "release-${{ github.run_id }}-test" \
            --email "release-${{ github.run_id }}@example.com" \
            --channel "${{ needs.create-release.outputs.channel }}" \
            --expires-in 24h \
            --kots-install=false \
            --helm-install \
            --output json 2>&1)
          echo "${OUTPUT}"
          CUSTOMER_ID=$(echo "${OUTPUT}" | jq -r '.id')
          LICENSE_ID=$(echo "${OUTPUT}" | jq -r '.installationId')
          echo "customer-id=${CUSTOMER_ID}" >> $GITHUB_OUTPUT
          echo "license-id=${LICENSE_ID}" >> $GITHUB_OUTPUT

      - name: Create CMX cluster
        id: cluster
        run: |
          OUTPUT=$(replicated cluster create \
            --distribution k3s \
            --version 1.34 \
            --name "release-${GITHUB_RUN_ID}" \
            --ttl 20m \
            --wait 10m \
            --output json 2>&1)
          echo "${OUTPUT}"
          CLUSTER_ID=$(echo "${OUTPUT}" | jq -r '.id')
          echo "cluster-id=${CLUSTER_ID}" >> $GITHUB_OUTPUT

      - name: Get kubeconfig
        run: |
          replicated cluster kubeconfig \
            "${{ steps.cluster.outputs.cluster-id }}" \
            --output-path kubeconfig.yaml
          export KUBECONFIG=./kubeconfig.yaml
          kubectl get nodes

      - name: Helm install from Replicated registry
        run: |
          export KUBECONFIG=./kubeconfig.yaml
          EMAIL="release-${GITHUB_RUN_ID}@example.com"
          LICENSE_ID="${{ steps.customer.outputs.license-id }}"

          helm registry login registry.replicated.com \
            --username "${EMAIL}" \
            --password "${LICENSE_ID}"

          CHART_VERSION=$(grep '^version:' chart/Chart.yaml | awk '{print $2}')
          echo "Chart version: ${CHART_VERSION}"

          helm install drone-rx \
            oci://registry.replicated.com/${REPLICATED_APP}/${{ needs.create-release.outputs.channel }}/drone-rx \
            --version "${CHART_VERSION}" \
            --namespace default \
            --timeout 10m || true

      - name: Smoke test
        run: |
          export KUBECONFIG=./kubeconfig.yaml

          echo "Waiting for pods to schedule..."
          sleep 30

          echo "Container images in use:"
          kubectl get pods -n default -o custom-columns='NAME:.metadata.name,IMAGE:.spec.containers[*].image,STATUS:.status.phase'

          echo "All pods:"
          kubectl get pods -A

          echo "Waiting for API..."
          kubectl rollout status deployment -l app.kubernetes.io/component=api -n default --timeout=300s || true

          kubectl get pods -n default

          API_SVC=$(kubectl get svc -n default -l app.kubernetes.io/component=api -o jsonpath='{.items[0].metadata.name}')
          echo "Found API service: ${API_SVC}"
          kubectl port-forward svc/${API_SVC} 8080:8080 -n default &
          sleep 10
          curl -f http://localhost:8080/healthz
          echo "Health check passed"

      - name: Cleanup — remove cluster
        if: always()
        continue-on-error: true
        run: |
          replicated cluster rm "${{ steps.cluster.outputs.cluster-id }}" 2>/dev/null || true

      - name: Cleanup — archive customer
        if: always()
        continue-on-error: true
        run: |
          replicated customer archive "${{ steps.customer.outputs.customer-id }}" 2>/dev/null || true

  promote-to-unstable:
    runs-on: ubuntu-latest
    needs: [build-and-push, create-release, test-on-cmx]
    env:
      REPLICATED_APP: ${{ secrets.REPLICATED_APP }}
      REPLICATED_API_TOKEN: ${{ secrets.REPLICATED_API_TOKEN }}
    steps:
      - name: Install Replicated CLI
        run: |
          curl -s https://api.github.com/repos/replicatedhq/replicated/releases/latest \
            | grep "browser_download_url.*linux_amd64.tar.gz" \
            | cut -d '"' -f 4 \
            | xargs curl -sL | tar xz -C /usr/local/bin replicated

      - name: Get Unstable channel ID
        id: channel
        run: |
          CHANNEL_ID=$(replicated channel ls --output json 2>/dev/null \
            | jq -r '.[] | select(.name == "Unstable") | .id')
          echo "channel-id=${CHANNEL_ID}" >> $GITHUB_OUTPUT

      - name: Promote to Unstable
        run: |
          echo "Promoting release ${{ needs.create-release.outputs.release-sequence }} to Unstable"
          replicated release promote \
            ${{ needs.create-release.outputs.release-sequence }} \
            "${{ steps.channel.outputs.channel-id }}" \
            --version "${{ needs.build-and-push.outputs.version }}"

      - name: Cleanup — archive temp channel
        continue-on-error: true
        run: |
          replicated channel rm "${{ needs.create-release.outputs.channel-id }}" 2>/dev/null || true

  attach-chart:
    runs-on: ubuntu-latest
    needs: [build-and-push, promote-to-unstable]
    if: ${{ github.event_name == 'push' }}
    steps:
      - uses: actions/checkout@v4

      - name: Add Helm repos
        run: |
          helm repo add cnpg https://cloudnative-pg.github.io/charts
          helm repo add nats https://nats-io.github.io/k8s/helm/charts
          helm repo update

      - name: Package and attach Helm chart to GitHub Release
        run: |
          VERSION="${{ needs.build-and-push.outputs.version }}"
          helm dependency build chart/
          helm package chart/ --version ${VERSION} --app-version ${VERSION}

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            drone-rx-${{ needs.build-and-push.outputs.version }}.tgz
