api:
  image:
    repository: images.littleroom.co.nz/proxy/drone-rx/ghcr.io/jmboby/dronerx-api
    tag: "latest"
    pullPolicy: IfNotPresent
  replicas: 1
  port: 8080
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  tickerInterval: 10
  webhookURL: ""

frontend:
  image:
    repository: images.littleroom.co.nz/proxy/drone-rx/ghcr.io/jmboby/dronerx-frontend
    tag: "latest"
    pullPolicy: IfNotPresent
  replicas: 1
  port: 3000
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

service:
  type: ClusterIP
  apiPort: 8080
  frontendPort: 3000

ingress:
  enabled: true
  hostname: "naughty-curie.ingress.replicatedcluster.com"
  tls:
    mode: "auto"
    secretName: "letsencrypt-cert"
    email: "jamesw@replicated.com"

cloudnative-pg:
  image:
    repository: images.littleroom.co.nz/proxy/drone-rx/ghcr.io/cloudnative-pg/cloudnative-pg
  imagePullSecrets: []

cloudnativepg:
  enabled: true

postgresql:
  enabled: true
  instances: 1
  storage:
    size: 1Gi

externalDatabase:
  host: ""
  port: 5432
  name: "dronerx"
  user: "dronerx"
  password: ""

imagePullSecrets: []

replicated:
  fullnameOverride: "drone-rx-sdk"

nats:
  enabled: true
  global:
    image:
      pullSecretNames: []
  nats:
    image:
      registry: images.littleroom.co.nz/proxy/drone-rx/docker.io
      repository: library/nats
  reloader:
    image:
      registry: images.littleroom.co.nz/proxy/drone-rx/docker.io
      repository: natsio/nats-server-config-reloader
  natsBox:
    image:
      registry: images.littleroom.co.nz/proxy/drone-rx/docker.io
      repository: natsio/nats-box
