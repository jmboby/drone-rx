api:
  image:
    registry: images.littleroom.co.nz
    repository: proxy/drone-rx/ghcr.io/jmboby/dronerx-api
    tag: "1.0.0" # x-release-please-version
    pullPolicy: IfNotPresent
  replicas: 1
  port: 8080
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  tickerInterval: 5
  webhookURL: ""
  liveTrackingEnabled: "true"
  lightModeEnabled: "false"

frontend:
  image:
    registry: images.littleroom.co.nz
    repository: proxy/drone-rx/ghcr.io/jmboby/dronerx-frontend
    tag: "1.0.0" # x-release-please-version
    pullPolicy: IfNotPresent
  replicas: 1
  port: 3000
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

service:
  type: ClusterIP
  apiPort: 8080
  frontendPort: 3000

ingress:
  enabled: true
  hostname: "naughty-curie.ingress.replicatedcluster.com"
  tls:
    mode: "auto"
    secretName: "letsencrypt-cert"
    existingSecretName: ""
    email: ""
    cloudflare:
      enabled: false
      # Name of a Kubernetes Secret holding the Cloudflare API token
      # (key: api-token). Populated by KOTS when tls.mode=cloudflare.
      apiTokenSecretName: ""

cloudnative-pg:
  image:
    repository: images.littleroom.co.nz/proxy/drone-rx/ghcr.io/cloudnative-pg/cloudnative-pg
  imagePullSecrets:
    - name: enterprise-pull-secret

# -- CNPG operator management mode.
# true = operator deployed as subchart (helm CLI installs)
# false = operator deployed externally via Replicated HelmChart CR
cnpgOperator:
  managed: true

# -- Embedded PostgreSQL (CloudNativePG).
# Set postgresql.enabled=false and configure externalDatabase to use BYO Postgres.
# This toggle controls both the CNPG operator subchart and the Cluster CR.
postgresql:
  enabled: true
  imageName: images.littleroom.co.nz/proxy/drone-rx/ghcr.io/cloudnative-pg/postgresql:18.3-system-trixie
  instances: 1
  storage:
    size: 1Gi
  # Embedded DB app-user password. Empty = let CNPG auto-generate.
  # KOTS installs pass a cached RandomString via HelmChart CR.
  password: ""

# -- External (BYO) PostgreSQL connection.
# Only used when postgresql.enabled=false.
# All fields are required when using external database.
# Pass password via --set at install time, not in this file.
externalDatabase:
  host: "ep-wispy-boat-anis4ukg.c-6.us-east-1.aws.neon.tech"
  port: 5432
  name: "neondb"
  user: "neondb_owner"
  password: ""
  sslmode: "require"

busybox:
  image: images.littleroom.co.nz/proxy/drone-rx/index.docker.io/library/busybox:1.36

selfSignedCert:
  # Main container runs kubectl to apply the generated Secret.
  # Tag tracks the cluster k8s minor version for client compat.
  image: images.littleroom.co.nz/proxy/drone-rx/index.docker.io/alpine/k8s:1.34.7
  # initContainer generates the self-signed cert (alpine/k8s doesn't
  # ship openssl, so we split cert gen into a dedicated init step).
  opensslImage: images.littleroom.co.nz/proxy/drone-rx/index.docker.io/alpine/openssl:3.5.6

imagePullSecrets:
  - name: enterprise-pull-secret

replicated:
  nameOverride: "drone-rx-sdk"
  image:
    registry: images.littleroom.co.nz
    repository: library/replicated-sdk-image

nats:
  enabled: true
  global:
    image:
      pullSecretNames:
        - enterprise-pull-secret
  container:
    image:
      registry: images.littleroom.co.nz/proxy/drone-rx/index.docker.io
      repository: library/nats
  reloader:
    image:
      registry: images.littleroom.co.nz/proxy/drone-rx/index.docker.io
      repository: natsio/nats-server-config-reloader
  natsBox:
    container:
      image:
        registry: images.littleroom.co.nz/proxy/drone-rx/index.docker.io
        repository: natsio/nats-box
