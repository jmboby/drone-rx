api:
  image:
    repository: images.littleroom.co.nz/proxy/drone-rx/ghcr.io/jmboby/dronerx-api
    tag: "1.0.0" # x-release-please-version
    pullPolicy: IfNotPresent
  replicas: 1
  port: 8080
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  tickerInterval: 5
  webhookURL: ""

frontend:
  image:
    repository: images.littleroom.co.nz/proxy/drone-rx/ghcr.io/jmboby/dronerx-frontend
    tag: "1.0.0" # x-release-please-version
    pullPolicy: IfNotPresent
  replicas: 1
  port: 3000
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

service:
  type: ClusterIP
  apiPort: 8080
  frontendPort: 3000

ingress:
  enabled: true
  hostname: "naughty-curie.ingress.replicatedcluster.com"
  tls:
    mode: "auto"
    secretName: "letsencrypt-cert"
    email: "jamesw@replicated.com"
    cloudflare:
      enabled: false

cloudnative-pg:
  image:
    repository: images.littleroom.co.nz/anonymous/ghcr.io/cloudnative-pg/cloudnative-pg
  imagePullSecrets: []

# -- Embedded PostgreSQL (CloudNativePG).
# Set postgresql.enabled=false and configure externalDatabase to use BYO Postgres.
# This toggle controls both the CNPG operator subchart and the Cluster CR.
postgresql:
  enabled: true
  instances: 1
  storage:
    size: 1Gi

# -- External (BYO) PostgreSQL connection.
# Only used when postgresql.enabled=false.
# All fields are required when using external database.
# -- External (BYO) PostgreSQL connection.
# Only used when postgresql.enabled=false.
# All fields are required when using external database.
# Pass sensitive values via --set at install time, not in this file.
externalDatabase:
  host: ""
  port: 5432
  name: "neondb"
  user: "neondb_owner"
  password: ""
  sslmode: "require"

imagePullSecrets: []

replicated:
  nameOverride: "drone-rx-sdk"
  image:
    registry: images.littleroom.co.nz
    repository: library/replicated-sdk-image

nats:
  enabled: true
  global:
    image:
      pullSecretNames: []
  nats:
    image:
      registry: images.littleroom.co.nz/anonymous/index.docker.io
      repository: library/nats
  reloader:
    image:
      registry: images.littleroom.co.nz/anonymous/index.docker.io
      repository: natsio/nats-server-config-reloader
  natsBox:
    image:
      registry: images.littleroom.co.nz/anonymous/index.docker.io
      repository: natsio/nats-box
