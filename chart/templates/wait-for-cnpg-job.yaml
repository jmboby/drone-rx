{{- if and .Values.postgresql.enabled .Values.cloudnativepg.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "dronerx.fullname" . }}-wait-cnpg
  labels:
    {{- include "dronerx.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "1"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      imagePullSecrets:
        {{- include "dronerx.imagePullSecrets" . | nindent 8 }}
      containers:
        - name: wait
          image: images.littleroom.co.nz/proxy/drone-rx/docker.io/library/busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for CNPG webhook to accept connections..."
              for i in $(seq 1 60); do
                if nc -z cnpg-webhook-service.{{ .Release.Namespace }}.svc 443 2>/dev/null; then
                  echo "CNPG webhook is ready after $i attempts"
                  sleep 5
                  exit 0
                fi
                echo "Attempt $i/60 - webhook not ready..."
                sleep 5
              done
              echo "Timed out waiting for CNPG webhook"
              exit 1
{{- end }}
