{{- if and .Values.postgresql.enabled .Values.cloudnativepg.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "dronerx.fullname" . }}-wait-cnpg
  labels:
    {{- include "dronerx.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "1"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      serviceAccountName: {{ include "dronerx.fullname" . }}-cnpg-waiter
      containers:
        - name: wait
          image: bitnami/kubectl:1.31
          command:
            - sh
            - -c
            - |
              echo "Waiting for CNPG operator to be ready..."
              kubectl wait --for=condition=available deployment \
                -l app.kubernetes.io/name=cloudnative-pg \
                -n {{ .Release.Namespace }} \
                --timeout=120s
              echo "CNPG operator is ready"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "dronerx.fullname" . }}-cnpg-waiter
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "dronerx.fullname" . }}-cnpg-waiter
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "dronerx.fullname" . }}-cnpg-waiter
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
subjects:
  - kind: ServiceAccount
    name: {{ include "dronerx.fullname" . }}-cnpg-waiter
roleRef:
  kind: Role
  name: {{ include "dronerx.fullname" . }}-cnpg-waiter
  apiGroup: rbac.authorization.k8s.io
{{- end }}
