{{- if .Values.postgresql.enabled }}
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: {{ include "dronerx.fullname" . }}-db
  labels:
    {{- include "dronerx.labels" . | nindent 4 }}
spec:
  instances: {{ .Values.postgresql.instances }}
  bootstrap:
    initdb:
      database: dronerx
      owner: dronerx
      secret:
        name: {{ include "dronerx.fullname" . }}-db-credentials
  storage:
    size: {{ .Values.postgresql.storage.size }}
{{- end }}
