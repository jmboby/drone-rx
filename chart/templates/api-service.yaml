apiVersion: v1
kind: Service
metadata:
  name: {{ include "dronerx.fullname" . }}-api
  labels:
    {{- include "dronerx.api.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.apiPort }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "dronerx.api.selectorLabels" . | nindent 4 }}
