apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "dronerx.fullname" . }}-api
  labels:
    {{- include "dronerx.api.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      {{- include "dronerx.api.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        # Roll the api pods when the ConfigMap content changes so KOTS config
        # changes (light_mode_enabled, admin_link_visible, ticker_interval, etc.)
        # propagate on `helm upgrade` without a manual restart.
        checksum/config: {{ include (print $.Template.BasePath "/configmap-api.yaml") . | sha256sum }}
      labels:
        {{- include "dronerx.api.selectorLabels" . | nindent 8 }}
    spec:
      imagePullSecrets:
        {{- include "dronerx.imagePullSecrets" . | nindent 8 }}
      serviceAccountName: {{ include "dronerx.fullname" . }}-api
      {{- if eq .Values.postgresql.enabled true }}
      initContainers:
        - name: wait-for-db
          image: {{ .Values.busybox.image }}
          command:
            - sh
            - -c
            - |
              until nc -z {{ include "dronerx.fullname" . }}-db-rw 5432; do
                echo "Waiting for PostgreSQL...";
                sleep 2;
              done
      {{- end }}
      containers:
        - name: api
          image: "{{ .Values.api.image.registry }}/{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.api.port }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "dronerx.fullname" . }}-api-config
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  {{- if eq .Values.postgresql.enabled true }}
                  name: {{ include "dronerx.fullname" . }}-db-app
                  key: password
                  {{- else }}
                  name: {{ include "dronerx.fullname" . }}-db-credentials
                  key: password
                  {{- end }}
            - name: DATABASE_URL
              value: "{{ include "dronerx.databaseURL" . }}"
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
