apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "dronerx.fullname" . }}-api
  labels:
    {{- include "dronerx.api.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      {{- include "dronerx.api.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "dronerx.api.selectorLabels" . | nindent 8 }}
    spec:
      {{- if .Values.postgresql.enabled }}
      initContainers:
        - name: wait-for-db
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z {{ include "dronerx.fullname" . }}-db-rw 5432; do
                echo "Waiting for PostgreSQL...";
                sleep 2;
              done
      {{- end }}
      containers:
        - name: api
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.api.port }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "dronerx.fullname" . }}-api-config
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "dronerx.fullname" . }}-db-credentials
                  key: password
            - name: DATABASE_URL
              value: "postgres://dronerx:$(DB_PASSWORD)@{{ include "dronerx.fullname" . }}-db-rw:5432/dronerx?sslmode=disable"
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
