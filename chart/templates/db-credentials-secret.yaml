{{- if not .Values.postgresql.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "dronerx.fullname" . }}-db-credentials
  labels:
    {{- include "dronerx.labels" . | nindent 4 }}
type: Opaque
stringData:
  password: {{ .Values.externalDatabase.password | default "" | quote }}
{{- end }}
