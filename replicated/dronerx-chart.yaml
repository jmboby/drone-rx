apiVersion: kots.io/v1beta2
kind: HelmChart
metadata:
  name: drone-rx
spec:
  chart:
    name: drone-rx
    chartVersion: $VERSION
  builder:
    api:
      image:
        registry: ghcr.io
        repository: jmboby/dronerx-api
        tag: $VERSION
    frontend:
      image:
        registry: ghcr.io
        repository: jmboby/dronerx-frontend
        tag: $VERSION
    cloudnative-pg:
      image:
        repository: ghcr.io/cloudnative-pg/cloudnative-pg
        tag: "1.29.0"
    nats:
      container:
        image:
          repository: index.docker.io/library/nats
          tag: 2.12.6-alpine
      reloader:
        image:
          repository: index.docker.io/natsio/nats-server-config-reloader
          tag: "0.21.1"
      natsBox:
        image:
          repository: index.docker.io/natsio/nats-box
          tag: "0.19.3"
  values:
    api:
      image:
        registry: 'repl{{ ReplicatedImageRegistry "ghcr.io" }}'
        repository: 'repl{{ ReplicatedImageRepository "ghcr.io/jmboby/dronerx-api" }}'
        tag: $VERSION
      liveTrackingEnabled: 'repl{{ LicenseFieldValue "live_tracking_enabled" }}'
    frontend:
      image:
        registry: 'repl{{ ReplicatedImageRegistry "ghcr.io" }}'
        repository: 'repl{{ ReplicatedImageRepository "ghcr.io/jmboby/dronerx-frontend" }}'
        tag: $VERSION
    ingress:
      enabled: false
      tls:
        mode: "self-signed"
    postgresql:
      enabled: repl{{ ConfigOptionEquals "database_type" "embedded" }}
      instances: repl{{ ConfigOption "postgres_instances" | ParseInt }}
    externalDatabase:
      host: repl{{ ConfigOption "external_db_host" }}
      port: repl{{ ConfigOption "external_db_port" | ParseInt }}
      name: repl{{ ConfigOption "external_db_name" }}
      user: repl{{ ConfigOption "external_db_user" }}
      password: repl{{ ConfigOption "external_db_password" }}
      sslmode: repl{{ ConfigOption "external_db_sslmode" }}
    cloudnative-pg:
      image:
        repository: 'repl{{ ReplicatedImageRegistry "ghcr.io" }}/repl{{ ReplicatedImageRepository "ghcr.io/cloudnative-pg/cloudnative-pg" }}'
      imagePullSecrets:
        - name: enterprise-pull-secret
    nats:
      global:
        image:
          pullSecretNames:
            - enterprise-pull-secret
