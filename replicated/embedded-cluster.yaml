apiVersion: embeddedcluster.replicated.com/v1beta1
kind: Config
metadata:
  name: drone-rx
spec:
  version: "3.0.0-alpha-31+k8s-1.34"
  extensions:
    helm:
      repositories:
        - name: jetstack
          url: https://charts.jetstack.io
      charts:
        - name: cert-manager
          chartname: jetstack/cert-manager
          namespace: cert-manager
          version: "v1.17.1"
          values: |
            crds:
              enabled: true
            image:
              digest: ""
            webhook:
              image:
                digest: ""
            cainjector:
              image:
                digest: ""
            startupapicheck:
              image:
                digest: ""
