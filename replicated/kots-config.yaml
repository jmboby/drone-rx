apiVersion: kots.io/v1beta1
kind: Config
metadata:
  name: drone-rx
spec:
  groups:
    - name: database
      title: Database
      description: Configure how DroneRx connects to PostgreSQL.
      items:
        - name: database_type
          title: Database Type
          help_text: Embedded runs CloudNativePG in-cluster; External connects to your existing PostgreSQL (e.g. RDS, Neon).
          type: select_one
          default: embedded
          items:
            - name: embedded
              title: Embedded (CloudNativePG)
            - name: external
              title: External (BYO PostgreSQL)
        - name: postgres_instances
          title: PostgreSQL Instances
          help_text: Number of CNPG cluster instances. 1 = single primary; 2+ = HA with streaming replicas.
          type: text
          default: "1"
          when: 'repl{{ ConfigOptionEquals "database_type" "embedded" }}'
        - name: postgres_storage_size
          title: PostgreSQL Storage Size
          help_text: PVC size for each PostgreSQL instance (e.g. 1Gi, 10Gi, 100Gi).
          type: text
          default: "1Gi"
          when: 'repl{{ ConfigOptionEquals "database_type" "embedded" }}'
        - name: db_password
          title: Embedded Database Password
          help_text: Password for the embedded PostgreSQL dronerx user. Auto-generated on first install and preserved across upgrades. Override if you want to set a known value.
          type: password
          default: 'repl{{ RandomString 32 }}'
          when: 'repl{{ ConfigOptionEquals "database_type" "embedded" }}'
        - name: external_db_host
          title: Host
          help_text: Hostname or IP of your external PostgreSQL server.
          type: text
          when: 'repl{{ ConfigOptionEquals "database_type" "external" }}'
        - name: external_db_port
          title: Port
          help_text: TCP port the PostgreSQL server listens on. Usually 5432.
          type: text
          default: "5432"
          when: 'repl{{ ConfigOptionEquals "database_type" "external" }}'
        - name: external_db_name
          title: Database Name
          help_text: Name of the pre-created database DroneRx will connect to.
          type: text
          default: "neondb"
          when: 'repl{{ ConfigOptionEquals "database_type" "external" }}'
        - name: external_db_user
          title: Username
          help_text: PostgreSQL role DroneRx will authenticate as. Needs CREATE on the database.
          type: text
          when: 'repl{{ ConfigOptionEquals "database_type" "external" }}'
        - name: external_db_password
          title: Password
          help_text: Password for the PostgreSQL user above.
          type: password
          when: 'repl{{ ConfigOptionEquals "database_type" "external" }}'
        - name: external_db_sslmode
          title: SSL Mode
          help_text: libpq sslmode. "require" is correct for most managed services (Neon, RDS); "verify-full" for strict CA pinning.
          type: select_one
          default: require
          when: 'repl{{ ConfigOptionEquals "database_type" "external" }}'
          items:
            - name: disable
              title: Disable
            - name: require
              title: Require
            - name: verify-ca
              title: Verify CA
            - name: verify-full
              title: Verify Full
    - name: ingress
      title: Ingress & TLS
      description: Configure external access and TLS for DroneRx.
      items:
        - name: ingress_enabled
          title: Enable Ingress
          help_text: Install Traefik and expose DroneRx externally. Disable if fronting with your own ingress controller or service mesh.
          type: bool
          default: "1"
        - name: ingress_hostname
          title: Hostname
          help_text: The DNS name clients will use to reach DroneRx (e.g. drone-rx.example.com).
          type: text
          required: true
          when: 'repl{{ ConfigOptionEquals "ingress_enabled" "1" }}'
        - name: tls_mode
          title: TLS Mode
          help_text: How DroneRx obtains its ingress TLS certificate.
          type: select_one
          default: self-signed
          when: 'repl{{ ConfigOptionEquals "ingress_enabled" "1" }}'
          items:
            - name: self-signed
              title: Self-signed (cluster-generated)
            - name: auto
              title: Let's Encrypt (HTTP-01)
            - name: cloudflare
              title: Let's Encrypt (Cloudflare DNS-01)
            - name: existing-secret
              title: Existing Kubernetes Secret (BYO)
        - name: tls_existing_secret_name
          title: Existing TLS Secret Name
          help_text: Name of a pre-created kubernetes.io/tls Secret in the app namespace.
          type: text
          when: 'repl{{ and (ConfigOptionEquals "ingress_enabled" "1") (ConfigOptionEquals "tls_mode" "existing-secret") }}'
        - name: tls_email
          title: Contact Email
          help_text: Used by Let's Encrypt for certificate expiry notices. Must be a valid email address.
          type: text
          when: 'repl{{ and (ConfigOptionEquals "ingress_enabled" "1") (or (ConfigOptionEquals "tls_mode" "auto") (ConfigOptionEquals "tls_mode" "cloudflare")) }}'
          validation:
            regex:
              pattern: '^[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}$'
              message: Enter a valid email address (e.g. ops@example.com).
        - name: cloudflare_api_token
          title: Cloudflare API Token
          help_text: Scoped token with Zone:DNS:Edit for the ingress domain.
          type: password
          when: 'repl{{ and (ConfigOptionEquals "ingress_enabled" "1") (ConfigOptionEquals "tls_mode" "cloudflare") }}'
        - name: traefik_service_type
          title: Traefik Service Type
          help_text: NodePort for bare-metal/Embedded Cluster, LoadBalancer for cloud installs.
          type: select_one
          default: NodePort
          when: 'repl{{ ConfigOptionEquals "ingress_enabled" "1" }}'
          items:
            - name: NodePort
              title: NodePort
            - name: LoadBalancer
              title: LoadBalancer
    - name: scaling
      title: Scaling & Tuning
      description: Adjust replica counts and polling intervals.
      items:
        - name: api_replicas
          title: API Replicas
          help_text: Number of API deployment pods. Scale up for redundancy or higher throughput.
          type: text
          default: "1"
        - name: frontend_replicas
          title: Frontend Replicas
          help_text: Number of frontend deployment pods.
          type: text
          default: "1"
        - name: api_ticker_interval
          title: API Ticker Interval (seconds)
          help_text: How often the API advances drone simulation state.
          type: text
          default: "5"
    - name: integrations
      title: Integrations
      description: Outbound notification and webhook endpoints.
      items:
        - name: webhook_url
          title: Notification Webhook URL
          help_text: DroneRx POSTs delivery events to this URL. Leave blank to disable.
          type: text
          default: ""
          validation:
            regex:
              pattern: '^$|^https?://[^\s]+$'
              message: Must be blank or a valid http(s) URL.
    - name: ui
      title: User Interface
      description: Optional UI features visible to all end users.
      items:
        - name: light_mode_enabled
          title: Light / Dark Mode Toggle
          help_text: Allow end users to switch between light and dark themes via a toggle in the main site header.
          type: bool
          default: "0"
        - name: admin_link_visible
          title: Show Admin Link
          help_text: Display an "Admin" link in the main site header pointing to operational tooling at /admin (support bundle, webhooks, observability).
          type: bool
          default: "0"
    - name: features
      title: Features
      description: Entitlement-gated paying features. Locked items are unavailable on your current license — contact your vendor to upgrade.
      items:
        # Live Drone Tracking — editable when the license entitles this feature.
        - name: live_tracking_enabled
          title: Live Drone Tracking
          help_text: Stream real-time drone telemetry to the UI.
          type: bool
          default: "1"
          when: 'repl{{ LicenseFieldValue "live_tracking_enabled" | ParseBool }}'
        # Live Drone Tracking — greyed-out placeholder shown when the license lacks the entitlement.
        - name: live_tracking_enabled_locked
          title: Live Drone Tracking
          help_text: Your license does not include the live_tracking_enabled entitlement. Contact your vendor to upgrade.
          type: bool
          default: "0"
          readonly: true
          when: 'repl{{ not (LicenseFieldValue "live_tracking_enabled" | ParseBool) }}'
